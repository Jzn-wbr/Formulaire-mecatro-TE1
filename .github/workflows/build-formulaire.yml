name: Build formulaire PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - "formulaire.tex"
      - "assets/**"
      - ".github/workflows/build-formulaire.yml"

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: formulaire.tex

      - name: Prepare Pages content
        run: |
          mkdir -p public
          cp formulaire.pdf public/formulaire.pdf

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
