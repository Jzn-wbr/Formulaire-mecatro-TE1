name: Build formulaire PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "formulaire.tex"
      - "assets/**"
      - ".github/workflows/build-formulaire.yml"

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: formulaire.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: formulaire-pdf
          path: formulaire.pdf
